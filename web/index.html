<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor IA - Automatización</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0d1b2a; color: #e0e1dd; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #chat-container { width: 100%; max-width: 600px; background: #1b263b; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #historial { height: 300px; overflow-y: auto; border: 1px solid #415a77; padding: 10px; margin-bottom: 15px; background: #0d1b2a; border-radius: 4px; }
        .user-msg { color: #5bc0be; margin: 5px 0; font-weight: bold; }
        .ia-msg { color: #a2d2ff; margin: 5px 0; }
        #input-panel { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #415a77; background: #1b263b; color: white; }
        button { padding: 10px 20px; background: #00b4d8; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0077b6; }
    </style>
</head>
<body>

    <h2>Panel de Control - IA y Robot</h2>
    <div id="chat-container">
        <div id="historial"></div>
        <div id="input-panel">
            <input type="text" id="mensaje" placeholder="Escribe aquí tu trámite..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>
        const empresaNombre = "Empresa_Demo_123";

        async function enviar() {
            const input = document.getElementById("mensaje");
            const historial = document.getElementById("historial");
            const mensaje = input.value.trim();
            if (!mensaje) return;

            // Mostrar mensaje del usuario en el chat
            historial.innerHTML += `<div class="user-msg">Tú: ${mensaje}</div>`;
            input.value = "";
            historial.scrollTop = historial.scrollHeight;

            try {
                // Petición directa a la ruta /chat de tu servidor
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ empresa: empresaNombre, mensaje: mensaje })
                });
                const data = await response.json();
                historial.innerHTML += `<div class="ia-msg">IA: ${data.respuesta}</div>`;
            } catch (error) {
                historial.innerHTML += `<div class="ia-msg" style="color:#e63946;">Error al conectar con el servidor.</div>`;
            }
            historial.scrollTop = historial.scrollHeight;
        }
    </script>
</body>
</html>
