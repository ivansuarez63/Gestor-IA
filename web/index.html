<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestor-IA</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:#0b1220;color:white;}header{height:80px;background:#111827;display:flex;align-items:center;justify-content:space-between;padding:0 35px;}.logo{font-size:30px;font-weight:bold;color:#38bdf8;}button{background:#38bdf8;border:0;padding:12px 18px;border-radius:12px;cursor:pointer;font-weight:bold;}.container{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 80px);}.menu{background:#111827;padding:20px;}.menu div{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:12px;cursor:pointer;}.content{padding:25px;display:flex;justify-content:center;}.card{width:100%;max-width:1200px;background:#111827;padding:25px;border-radius:22px;}#chat{height:500px;overflow-y:auto;background:#070d18;padding:25px;border-radius:18px;display:flex;flex-direction:column;gap:15px;margin-bottom:15px;}.user{display:flex;justify-content:flex-end;}.user span{background:#38bdf8;color:black;padding:14px 18px;border-radius:18px;max-width:75%;white-space:pre-wrap;overflow-wrap:anywhere;}.bot{display:flex;justify-content:flex-start;}.bot span{background:#1e293b;padding:14px 18px;border-radius:18px;max-width:75%;white-space:pre-wrap;overflow-wrap:anywhere;}input{width:85%;padding:16px;border-radius:12px;border:0;font-size:16px;}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;align-items:center;justify-content:center;}.modal-box{background:#111827;padding:30px;border-radius:20px;width:350px;}.modal-box input{width:100%;margin:8px 0;}.planes{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}.plan{background:#1e293b;padding:20px;border-radius:18px;}.fila-chat{display:flex;gap:10px;align-items:center;}.fila-chat input{flex:1;width:auto;}
</style>
</head>
<body>
<header>
<div class="logo">Gestor-IA</div>
<div id="usuario">
<button onclick="login()">Iniciar sesión</button>
<button onclick="registro()">Registrarse</button>
<button onclick="ia()">🤖 IA</button>
</div>
</header>
<div class="container">
<div class="menu">
<div onclick="inicio()">🏠 Inicio</div>
<div onclick="tareas()">📋 Tareas</div>
<div onclick="ia()">🤖 IA</div>
<div onclick="servicios()">🛠 Servicios</div>
<div onclick="ajustes()">⚙ Ajustes</div>
</div>
<div class="content" id="contenido"></div>
</div>
<div class="modal" id="modal">
<div class="modal-box" id="modalContenido"></div>
</div>
<script>
function inicio(){contenido.innerHTML=`<div class="card"><h1>Gestor-IA</h1><h2>Automatización administrativa</h2><p>Gestiona trámites y procesos con inteligencia artificial.</p><br><button onclick="solicitarCertificado()">Pedir certificado</button></div>`;}
function login(){modalContenido.innerHTML=`<h2>Iniciar sesión</h2><input id="loginEmail" placeholder="Correo"><input id="loginPass" type="password" placeholder="Contraseña"><br><br><button onclick="entrar()">Entrar</button>`;modal.style.display="flex";}
async function entrar(){let email=document.getElementById("loginEmail").value;let pass=document.getElementById("loginPass").value;try{let res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:pass})});let data=await res.json();if(data.ok){modal.style.display="none";usuario.innerHTML=`<span>Bienvenido ${data.usuario || email}</span>`;inicio();}else{alert("Login incorrecto");}}catch(e){alert("La API de login no responde");}}
function registro(){modalContenido.innerHTML=`<h2>Registro</h2><input id="regNombre" placeholder="Nombre"><input id="regEmail" placeholder="Correo"><input id="regPass" type="password" placeholder="Contraseña"><br><br><button onclick="crearCuenta()">Crear cuenta</button>`;modal.style.display="flex";}
async function crearCuenta(){let nombre=document.getElementById("regNombre").value;let email=document.getElementById("regEmail").value;let pass=document.getElementById("regPass").value;try{let res=await fetch("/api/registro",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nombre:nombre,email:email,password:pass})});let data=await res.json();if(data.ok){alert("Cuenta creada");modal.style.display="none";}else{alert("No se pudo crear la cuenta");}}catch(e){alert("La API de registro no responde");}}
function tareas(){contenido.innerHTML=`<div class="card"><h1>Tareas</h1><p>Aquí aparecerán las tareas administrativas.</p></div>`;}
function servicios(){contenido.innerHTML=`<div class="card"><h1>Servicios</h1><div class="planes"><div class="plan"><h3>Básico</h3><p>Gestiones simples</p></div><div class="plan"><h3>Profesional</h3><p>Automatización avanzada</p></div><div class="plan"><h3>Empresa</h3><p>Integración con IA y robots</p></div></div></div>`;}
function ajustes(){contenido.innerHTML=`<div class="card"><h1>Ajustes</h1><p>Configura tu cuenta y preferences.</p></div>`;}
function ia(){
contenido.innerHTML=`<div class="card"><h1>🤖 IA</h1><div id="chat"></div><div class="fila-chat"><input id="mensaje" placeholder="Escribe tu mensaje"><button id="btnEnviar">Enviar</button></div></div>`;
document.getElementById("btnEnviar").onclick = enviarMensaje;
document.getElementById("mensaje").addEventListener("keydown", function(e){if(e.key === "Enter"){enviarMensaje();}});
}
function agregarMensaje(tipo,texto){
let chat=document.getElementById("chat");if(!chat) return;let div=document.createElement("div");div.className=tipo;let span=document.createElement("span");span.textContent=texto;div.appendChild(span);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

async function enviarMensaje(){
  let input = document.getElementById("mensaje");
  if(!input) return;
  let texto = input.value.trim();
  if(!texto) return;

  agregarMensaje("user", texto);
  input.value = "";

  if(texto.toLowerCase().includes("certificado") || texto.toLowerCase().includes("deuda") || texto.toLowerCase().includes("estar al corriente")){
    agregarMensaje("bot", "Voy a pedirte los datos para solicitar el certificado.");
    await solicitarCertificado();
    return;
  }

  agregarMensaje("bot", "Pensando...");
  
  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mensaje: texto })
    });
    let data = await res.json();
    let chat = document.getElementById("chat");
    if(chat && chat.lastChild) { chat.removeChild(chat.lastChild); }

    if(res.ok) {
      agregarMensaje("bot", data.respuesta);
    } else {
      agregarMensaje("bot", "Error de la IA: " + (data.respuesta || "Fallo en Groq"));
    }
  } catch(e) {
    let chat = document.getElementById("chat");
    if(chat && chat.lastChild) chat.removeChild(chat.lastChild);
    agregarMensaje("bot", "Hubo un problema al conectar con el servidor.");
  }
}

async function solicitarCertificado(){let nombre = prompt("Nombre completo del cliente");if(!nombre) return;let nif = prompt("NIF del cliente");if(!nif) return;let tipo = prompt("Tipo: estar_al_corriente o deuda");if(!tipo) return;contenido.innerHTML = `<div class="card"><h1>Procesando</h1><p>Enviando al robot...</p></div>`;try{let res = await fetch("/api/solicitar-certificado", {method: "POST",headers: {"Content-Type": "application/json"},body: JSON.stringify({nombre: nombre,nif: nif,tipo: tipo})});let data = await res.json();if(data.ok){contenido.innerHTML = `<div class="card"><h1>Solicitud completada</h1><p><b>Mensaje:</b> ${data.robot.mensaje || "Correcto"}</p><p><b>Nombre:</b> ${data.robot.nombre || nombre}</p><p><b>NIF:</b> ${data.robot.nif || nif}</p><p><b>Tipo:</b> ${data.robot.tipo || tipo}</p><p><b>Archivo:</b> ${data.robot.archivo || "Generado"}</p></div>`;} else {contenido.innerHTML = `<div class="card"><h1>Error</h1><p>No se pudo procesar.</p></div>`;}}catch(error){contenido.innerHTML = `<div class="card"><h1>Error</h1><p>El robot no responde.</p></div>`;}}
modal.onclick=function(e){if(e.target===modal){modal.style.display="none";}}
inicio();
</script>
</body>
</html>
