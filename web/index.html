<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Gestor-IA</title>

<style>

*{
box-sizing:border-box
}

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0b1220;
color:white;
}


header{
height:80px;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 35px;
}


.logo{
font-size:30px;
font-weight:bold;
color:#38bdf8;
}


button{
background:#38bdf8;
border:0;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}


.container{
display:grid;
grid-template-columns:220px 1fr;
height:calc(100vh - 80px);
}



.menu{
background:#111827;
padding:20px;
}


.menu div{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:12px;
cursor:pointer;
}




.content{
padding:25px;
display:flex;
justify-content:center;
}



.card{
width:100%;
max-width:1200px;
background:#111827;
padding:25px;
border-radius:22px;
}



#chat{

height:650px;

overflow-y:auto;

background:#070d18;

padding:25px;

border-radius:18px;

display:flex;

flex-direction:column;

gap:15px;

}



.user{

display:flex;

justify-content:flex-end;

}



.user span{

background:#38bdf8;

color:black;

padding:14px 18px;

border-radius:18px;

max-width:75%;

white-space:pre-wrap;

overflow-wrap:anywhere;

}



.bot{

display:flex;

justify-content:flex-start;

}



.bot span{

background:#1e293b;

padding:14px 18px;

border-radius:18px;

max-width:75%;

white-space:pre-wrap;

overflow-wrap:anywhere;

}



input{

width:85%;

padding:16px;

border-radius:12px;

border:0;

font-size:16px;

}



.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#0008;

align-items:center;

justify-content:center;

}



.modal-box{

background:#111827;

padding:30px;

border-radius:20px;

width:350px;

}



.modal-box input{

width:100%;

margin:8px 0;

}



.planes{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}



.plan{

background:#1e293b;

padding:20px;

border-radius:18px;

}


</style>

</head>


<body>


<header>


<div class="logo">

Gestor-IA

</div>


<div id="usuario">


<button onclick="login()">Iniciar sesión</button>


<button onclick="registro()">Registrarse</button>


<button onclick="ia()">🤖 IA</button>


</div>


</header>


<div class="container">


<div class="menu">


<div onclick="inicio()">🏠 Inicio</div>


<div onclick="tareas()">📋 Tareas</div>


<div onclick="ia()">🤖 IA</div>


<div onclick="servicios()">🛠 Servicios</div>


<div onclick="ajustes()">⚙ Ajustes</div>


</div>



<div class="content" id="contenido"></div>


</div>



<div class="modal" id="modal">


<div class="modal-box" id="modalContenido"></div>


</div><script>


function inicio(){

contenido.innerHTML=`

<div class="card">

<h1>Gestor-IA</h1>

<h2>Automatización administrativa</h2>

<p>Gestiona trámites y procesos con inteligencia artificial.</p>

</div>

`;

}



function login(){

modalContenido.innerHTML=`

<h2>Iniciar sesión</h2>

<input id="loginEmail" placeholder="Correo">

<input id="loginPass" type="password" placeholder="Contraseña">

<br><br>

<button onclick="entrar()">Entrar</button>

`;

modal.style.display="flex";

}




async function entrar(){


let email=document.getElementById("loginEmail").value;

let pass=document.getElementById("loginPass").value;



let res=await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

email:email,

password:pass

})

});



let datos=await res.json();



if(datos.ok){


document.getElementById("usuario").innerHTML=

`
👤 ${datos.usuario}

<button onclick="ia()">🤖 IA</button>

`;

cerrar();


}else{

alert(datos.mensaje);

}

}





function registro(){


modalContenido.innerHTML=`

<h2>Crear cuenta</h2>


<input id="regNombre" placeholder="Nombre">


<input id="regEmail" placeholder="Correo">


<input id="regPass" type="password" placeholder="Contraseña">


<br><br>


<button onclick="crearCuenta()">Crear cuenta</button>


`;


modal.style.display="flex";

}





async function crearCuenta(){


let nombre=document.getElementById("regNombre").value;

let email=document.getElementById("regEmail").value;

let pass=document.getElementById("regPass").value;



let res=await fetch("/api/registro",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

nombre:nombre,

email:email,

password:pass

})

});



let datos=await res.json();



if(datos.ok){


alert("Cuenta creada");

cerrar();


}else{

alert(datos.mensaje);

}


}






function cerrar(){

modal.style.display="none";

}






function tareas(){


contenido.innerHTML=`

<div class="card">


<h1>📋 Tareas</h1>


<input placeholder="Nueva tarea">


<button>Añadir</button>


</div>

`;

}






function servicios(){


contenido.innerHTML=`

<div class="card">


<h1>🛠 Servicios</h1>


<div class="planes">


<div class="plan">

<h2>🟢 Básico</h2>

<h1>25€/mes</h1>

<p>✔ IA administrativa</p>

<p>✔ Certificados</p>

<p>✔ Documentos</p>

<p>✔ Historial</p>

<button>Contratar</button>

</div>



<div class="plan">

<h2>🔵 Profesional</h2>

<h1>59€/mes</h1>

<p>✔ Todo Básico</p>

<p>✔ Robots</p>

<p>✔ Prioridad</p>

<button>Contratar</button>

</div>



<div class="plan">

<h2>🟣 Empresa</h2>

<h1>149€/mes</h1>

<p>✔ Usuarios</p>

<p>✔ Flujos</p>

<p>✔ Integraciones</p>

<button>Contactar</button>

</div>


</div>


</div>

`;

}


function ia(){


contenido.innerHTML=`

<div class="card">


<h1>🤖 Gestor-IA</h1>


<div id="chat">


<div class="bot">

<span>

🤖 Hola, soy Gestor-IA. ¿En qué puedo ayudarte?

</span>

</div>


</div>



<input id="pregunta" placeholder="Escribe un mensaje..." onkeydown="enterEnviar(event)">


<button onclick="preguntarIA()">Enviar</button>


</div>

`;

}




function enterEnviar(e){

if(e.key==="Enter"){

preguntarIA();

}

}






async function preguntarIA(){


let caja=document.getElementById("pregunta");


let texto=caja.value;



if(!texto)return;



caja.value="";



let chat=document.getElementById("chat");



chat.innerHTML+=`

<div class="user">

<span>${texto}</span>

</div>

`;



chat.scrollTop=chat.scrollHeight;




let res=await fetch("/api/chat",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

mensaje:texto

})

});



let datos=await res.json();



chat.innerHTML+=`

<div class="bot">

<span>

🤖 ${datos.respuesta}

</span>

</div>

`;



chat.scrollTop=chat.scrollHeight;


}






function ajustes(){


contenido.innerHTML=`

<div class="card">


<h1>⚙ Ajustes</h1>


<p>Configuración de cuenta</p>


</div>

`;

}





inicio();


</script>



</body>

</html>
