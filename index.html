<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor-IA</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;

}



header{

height:80px;
background:#111827;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 30px;

}




.logo{

font-size:30px;
font-weight:bold;

color:#38bdf8;

}



button{

background:#38bdf8;
border:0;

padding:12px 18px;

border-radius:10px;

cursor:pointer;

}



.container{

display:grid;

grid-template-columns:220px 1fr;

height:calc(100vh - 80px);

}



.menu{

background:#111827;

padding:20px;

}




.menu div{

background:#1e293b;

padding:15px;

margin-bottom:15px;

border-radius:10px;

cursor:pointer;

}



.menu div:hover{

background:#334155;

}




.content{

padding:30px;

}




.card{

background:#1e293b;

padding:25px;

border-radius:15px;

}




input{

width:70%;

padding:12px;

border-radius:10px;

border:0;

}



</style>

</head>




<body>



<header>


<div class="logo">

Gestor-IA

</div>



<button onclick="ia()">

🤖 IA

</button>



</header>





<div class="container">



<div class="menu">



<div onclick="inicio()">

🏠 Inicio

</div>


<div onclick="tareas()">

📋 Tareas

</div>


<div onclick="ia()">

🤖 IA

</div>



<div onclick="ajustes()">

⚙ Ajustes

</div>



</div>







<div class="content" id="contenido">


</div>



</div>






<script>



function inicio(){


contenido.innerHTML=

`

<h1>Gestor-IA</h1>

<div class="card">

Tu asistente inteligente 🚀

</div>

`;

}




function tareas(){


contenido.innerHTML=

`

<h1>📋 Tareas</h1>

<div class="card">


<input placeholder="Nueva tarea">


<button>

Añadir

</button>


</div>

`;

}





function ia(){


contenido.innerHTML=

`

<h1>🤖 Gestor-IA</h1>


<div class="card">


<input id="pregunta"
placeholder="Escribe a la IA">


<button onclick="preguntarIA()">

Enviar

</button>


<p id="respuesta">

Esperando...

</p>


</div>

`;

}




async function preguntarIA(){


let texto=document
.getElementById("pregunta")
.value;



document.getElementById("respuesta")
.innerHTML="🤖 Pensando...";



let res=await fetch("/api/chat",
{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

mensaje:texto

})

});



let datos=await res.json();



document.getElementById("respuesta")
.innerHTML=datos.respuesta;


}




function ajustes(){


contenido.innerHTML=

`

<h1>⚙ Ajustes</h1>


<div class="card">

Configuración

</div>

`;

}



inicio();



</script>




</body>

</html>
