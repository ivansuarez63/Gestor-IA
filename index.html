<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor-IA</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}


header{
height:80px;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
}


.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}


button{

background:#38bdf8;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}


.container{

display:grid;
grid-template-columns:220px 1fr;
min-height:calc(100vh - 80px);

}



.menu{

background:#111827;
padding:20px;

}



.menu div{

padding:15px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;

}


.menu div:hover{

background:#1e293b;

}



.content{

padding:30px;

}



.card{

background:#1e293b;
padding:25px;
border-radius:15px;
margin-bottom:20px;

}



input{

padding:12px;
border-radius:10px;
border:none;
width:70%;

}



li{

margin:15px;
background:#334155;
padding:12px;
border-radius:10px;

}



</style>

</head>


<body>


<header>


<div class="logo">
🤖 Gestor-IA
</div>


<button onclick="saludo()">
IA
</button>


</header>



<div class="container">



<div class="menu">


<div>🏠 Inicio</div>

<div>📋 Tareas</div>

<div>📁 Proyectos</div>

<div>🤖 IA</div>

<div>⚙ Ajustes</div>


</div>




<div class="content">



<h1>Panel principal</h1>




<div class="card">


<h2>📋 Mis tareas</h2>


<input 
id="tarea"
placeholder="Escribe una tarea">


<button onclick="agregarTarea()">
Añadir
</button>


<ul id="lista">

</ul>



</div>




<div class="card">


<h2>🤖 Asistente Gestor-IA</h2>


<p id="mensaje">

Sistema preparado correctamente ✅

</p>


</div>




</div>



</div>





<script>


function agregarTarea(){


let texto =
document.getElementById("tarea").value;



if(texto==""){

alert("Escribe una tarea");

return;

}



let li =
document.createElement("li");



li.innerHTML =
texto +
" <button onclick='this.parentElement.remove()'>❌</button>";



document.getElementById("lista")
.appendChild(li);



document.getElementById("tarea")
.value="";


}





function saludo(){


document.getElementById("mensaje")
.innerHTML =
"🤖 Hola, soy Gestor-IA. Estoy funcionando.";


}


</script>



</body>

</html>
