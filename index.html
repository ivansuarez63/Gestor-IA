<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor-IA</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}


header{

height:80px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;

}


.logo{

font-size:28px;
font-weight:bold;
color:#38bdf8;

}


button{

background:#38bdf8;
border:0;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}


.container{

display:grid;
grid-template-columns:220px 1fr;
min-height:calc(100vh - 80px);

}



.menu{

background:#111827;
padding:20px;

}


.menu div{

padding:15px;
margin-bottom:10px;
background:#1e293b;
border-radius:10px;
cursor:pointer;

}



.menu div:hover{

background:#334155;

}



.content{

padding:30px;

}



.card{

background:#1e293b;
padding:25px;
border-radius:15px;
margin-bottom:20px;

}



input{

padding:12px;
border-radius:10px;
border:0;
width:70%;

}



li{

list-style:none;
background:#334155;
padding:12px;
margin:10px;
border-radius:10px;

}



</style>


</head>



<body>



<header>

<div class="logo">
🤖 Gestor-IA
</div>


<button onclick="ia()">
IA
</button>


</header>




<div class="container">



<div class="menu">


<div onclick="inicio()">🏠 Inicio</div>

<div onclick="mostrarTareas()">📋 Tareas</div>

<div onclick="proyectos()">📁 Proyectos</div>

<div onclick="ia()">🤖 IA</div>

<div onclick="ajustes()">⚙ Ajustes</div>


</div>





<div class="content" id="contenido">


<h1>Bienvenido</h1>


<div class="card">

Gestor-IA funcionando correctamente ✅

</div>


</div>




</div>







<script>


let tareas =
JSON.parse(localStorage.getItem("tareas")) || [];




function guardar(){

localStorage.setItem(
"tareas",
JSON.stringify(tareas)
);

}




function inicio(){

document.getElementById("contenido").innerHTML=

`
<h1>🏠 Inicio</h1>

<div class="card">

Bienvenido a Gestor-IA 🚀

</div>
`;

}




function mostrarTareas(){


let lista="";


tareas.forEach((t,i)=>{


lista +=

`
<li>

${t}

<button onclick="borrar(${i})">

❌

</button>

</li>

`;

});




document.getElementById("contenido").innerHTML=

`

<h1>📋 Tareas</h1>


<div class="card">


<input id="nueva" placeholder="Nueva tarea">


<button onclick="agregar()">

Añadir

</button>



<ul>

${lista}

</ul>



</div>

`;

}





function agregar(){


let texto =
document.getElementById("nueva").value;


if(texto=="") return;


tareas.push(texto);


guardar();


mostrarTareas();


}





function borrar(i){


tareas.splice(i,1);


guardar();


mostrarTareas();


}






function proyectos(){


document.getElementById("contenido").innerHTML=

`

<h1>📁 Proyectos</h1>


<div class="card">

Zona de proyectos próximamente

</div>

`;

}




function ia(){


document.getElementById("contenido").innerHTML=

`

<h1>🤖 IA</h1>


<div class="card">

Hola 👋 soy Gestor-IA

<br><br>

Asistente preparado.

</div>

`;

}




function ajustes(){


document.getElementById("contenido").innerHTML=

`

<h1>⚙ Ajustes</h1>


<div class="card">

Configuración del sistema

</div>

`;

}



</script>




</body>

</html>
