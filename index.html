<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor-IA</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}


header{
height:80px;
background:#111827;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
}


.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}


button{
background:#38bdf8;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}


.container{
display:grid;
grid-template-columns:220px 1fr;
min-height:calc(100vh - 80px);
}


.menu{
background:#111827;
padding:20px;
}


.menu div{
padding:15px;
margin-bottom:10px;
background:#1e293b;
border-radius:10px;
}


.content{
padding:30px;
}


.card{
background:#1e293b;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}


input{
padding:12px;
border-radius:10px;
border:none;
width:70%;
}


li{
list-style:none;
background:#334155;
padding:12px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
}


</style>

</head>


<body>


<header>

<div class="logo">
🤖 Gestor-IA
</div>

<button onclick="saludo()">
IA
</button>

</header>



<div class="container">


<div class="menu">

<div>🏠 Inicio</div>

<div>📋 Tareas</div>

<div>📁 Proyectos</div>

<div>🤖 IA</div>

<div>⚙ Ajustes</div>

</div>



<div class="content">


<h1>Panel principal</h1>



<div class="card">


<h2>📋 Mis tareas</h2>


<input 
id="tarea"
placeholder="Nueva tarea">


<button onclick="agregarTarea()">
Añadir
</button>


<ul id="lista">

</ul>


</div>




<div class="card">

<h2 id="mensaje">
🤖 Gestor-IA preparado
</h2>

<p>
Tu asistente inteligente está activo.
</p>

</div>



</div>


</div>




<script>


function cargarTareas(){


let tareas =
JSON.parse(localStorage.getItem("tareas")) || [];


let lista =
document.getElementById("lista");


lista.innerHTML="";


tareas.forEach(function(tarea){


crearTarea(tarea);


});


}




function agregarTarea(){


let caja =
document.getElementById("tarea");


let texto =
caja.value;



if(texto.trim()==""){

alert("Escribe una tarea");

return;

}



let tareas =
JSON.parse(localStorage.getItem("tareas")) || [];


tareas.push(texto);



localStorage.setItem(
"tareas",
JSON.stringify(tareas)
);



crearTarea(texto);


caja.value="";


}




function crearTarea(texto){


let li =
document.createElement("li");



li.innerHTML =
"<span>"+texto+"</span>";



let boton =
document.createElement("button");


boton.innerHTML="❌";


boton.onclick=function(){


borrarTarea(texto);


};



li.appendChild(boton);



document.getElementById("lista")
.appendChild(li);



}





function borrarTarea(texto){


let tareas =
JSON.parse(localStorage.getItem("tareas")) || [];



tareas =
tareas.filter(function(t){

return t !== texto;

});



localStorage.setItem(
"tareas",
JSON.stringify(tareas)
);



cargarTareas();


}




function saludo(){


document.getElementById("mensaje")
.innerHTML =
"🤖 Hola, soy Gestor-IA y estoy funcionando";


}




cargarTareas();


</script>



</body>

</html>
