<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestor-IA</title>


<style>

*{
box-sizing:border-box;
}


body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}


header{

height:80px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;

}


.logo{

font-size:28px;
font-weight:bold;
color:#38bdf8;

}



button{

background:#38bdf8;
border:0;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}



.container{

display:grid;
grid-template-columns:220px 1fr;
min-height:calc(100vh - 80px);

}




.menu{

background:#111827;
padding:20px;

}




.menu div{

padding:15px;
margin-bottom:10px;
background:#1e293b;
border-radius:10px;
cursor:pointer;

}




.menu div:hover{

background:#334155;

}




.content{

padding:30px;

}




.card{

background:#1e293b;
padding:25px;
border-radius:15px;

}




input{

width:70%;
padding:12px;
border:0;
border-radius:10px;

}



</style>


</head>


<body>



<header>


<div class="logo">
🤖 Gestor-IA
</div>


<div>


<button onclick="mostrarLogin()">
Login
</button>


<button onclick="mostrarRegistro()">
Registro
</button>


</div>



</header>





<div class="container">



<div class="menu">


<div onclick="inicio()">
🏠 Inicio
</div>


<div onclick="tareas()">
📋 Tareas
</div>


<div onclick="ia()">
🤖 IA
</div>


<div onclick="ajustes()">
⚙ Ajustes
</div>



</div>





<div class="content" id="contenido">



</div>



</div>







<script>




function inicio(){


contenido.innerHTML=


`

<h1>🏠 Inicio</h1>


<div class="card">

Bienvenido a Gestor-IA 🚀

</div>

`;



}





function tareas(){



contenido.innerHTML=

`

<h1>📋 Tareas</h1>


<div class="card">


<input placeholder="Nueva tarea">


<button>

Añadir

</button>


</div>


`;



}






function ia(){


contenido.innerHTML=

`

<h1>🤖 Gestor-IA</h1>


<div class="card">


<input 
id="pregunta"
placeholder="Escribe a la IA...">


<button onclick="preguntarIA()">

Enviar

</button>



<p id="respuesta">

Esperando mensaje...

</p>



</div>

`;



}





async function preguntarIA(){


let texto =
document.getElementById("pregunta").value;



if(texto==""){

alert("Escribe algo");

return;

}




document.getElementById("respuesta")
.innerHTML =
"🤖 Pensando...";



let respuesta =
await fetch("/api/chat",
{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

mensaje:texto

})

});




let datos =
await respuesta.json();



document.getElementById("respuesta")
.innerHTML =
datos.respuesta;



}







function mostrarLogin(){


contenido.innerHTML=

`

<h1>🔐 Login</h1>


<div class="card">


<input placeholder="Usuario">


<br><br>


<input placeholder="Contraseña">


</div>

`;



}





function mostrarRegistro(){


contenido.innerHTML=

`

<h1>📝 Registro</h1>


<div class="card">


<input placeholder="Correo">


<br><br>


<input placeholder="Contraseña">


</div>


`;



}







function ajustes(){


contenido.innerHTML=

`

<h1>⚙ Ajustes</h1>


<div class="card">

Configuración Gestor-IA

</div>


`;



}



inicio();


</script>




</body>

</html>
